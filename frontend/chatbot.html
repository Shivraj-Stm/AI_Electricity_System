<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Chatbot</title>


<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/chatbot.css">

</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">

  <div class="logo">⚡ AI Electricity</div>

  <ul>
    <li onclick="navigate('profile.html')">Profile</li>
    <li onclick="navigate('bill.html')">Bill</li>
    <li onclick="navigate('history.html')">History</li>
    <li onclick="navigate('prediction.html')">Prediction</li>
    <li onclick="navigate('chatbot.html')">Chatbot</li>

    <li class="logout" onclick="logout()">Logout</li>
  </ul>

</div>

<!-- Main Content -->
<div class="main">

<div class="greeting">
<h2 id="greetingText"></h2>
<p>How can I assist you today?</p>
</div>

<!--  ADD THIS -->
<div id="chatMessages"></div>

<!--  UPDATED INPUT -->
<div class="chat-input">

    <input 
        type="text" 
        id="userInput" 
        placeholder="Message AI..."
    />

    <!-- MIC ICON (SVG like ChatGPT) -->
    <button id="micBtn" onclick="startVoice()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3z" stroke="#555" stroke-width="2"/>
            <path d="M19 11a7 7 0 01-14 0" stroke="#555" stroke-width="2"/>
            <line x1="12" y1="18" x2="12" y2="22" stroke="#555" stroke-width="2"/>
            <line x1="8" y1="22" x2="16" y2="22" stroke="#555" stroke-width="2"/>
        </svg>
    </button>

    <!-- SEND BUTTON -->
   <button id="sendBtn">➤</button>

</div>

</div>

</div>
<script src="js/common.js"></script>
<script src="js/chatbot.js"></script>

</body>
</html>
